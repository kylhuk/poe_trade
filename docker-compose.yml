name: poe_trade

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: ${CH_DATABASE:-poe_trade}
      #CLICKHOUSE_USER: ${CH_USER:-poe_ingest}
      #CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-poe_ingest}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "${CH_NATIVE_PORT:-19000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./config/clickhouse/docker_related_config.xml:/etc/clickhouse-server/config.d/docker_related_config.xml:ro
      - ./config/clickhouse/users:/etc/clickhouse-server/users.d
      - ./logs/clickhouse:/var/log/clickhouse-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client -q 'SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - lama-lan_backend

  schema_migrator:
    build: .
    entrypoint: ["poe-migrate"]
    command: ["--apply"]
    env_file:
      - .env
    environment:
      POE_CLICKHOUSE_USER: ${POE_MIGRATOR_CLICKHOUSE_USER:-default}
      POE_CLICKHOUSE_PASSWORD: ${POE_MIGRATOR_CLICKHOUSE_PASSWORD:-}
      POE_CLICKHOUSE_URL: ${POE_CLICKHOUSE_INTERNAL_URL:-http://clickhouse:8123}
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"
    networks:
      - default

  market_harvester:
    build: .
    command: ["service", "--name", "market_harvester"]
    depends_on:
      clickhouse:
        condition: service_healthy
      schema_migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POE_CLICKHOUSE_URL: ${POE_CLICKHOUSE_INTERNAL_URL:-http://clickhouse:8123}
    volumes:
      - ./.state:/app/.state
    networks:
      - default

  account_stash_harvester:
    build: .
    command: ["service", "--name", "account_stash_harvester"]
    depends_on:
      clickhouse:
        condition: service_healthy
      schema_migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POE_CLICKHOUSE_URL: ${POE_CLICKHOUSE_INTERNAL_URL:-http://clickhouse:8123}
      POE_ENABLE_ACCOUNT_STASH: "true"
      POE_ACCOUNT_STASH_REALM: pc
      POE_ACCOUNT_STASH_LEAGUE: Mirage
      POE_ACCOUNT_STASH_ACCOUNT_NAME: wengaCH-0218
      POE_ACCOUNT_STASH_ACCESS_TOKEN: qa-seeded-token
    volumes:
      - ./.state:/app/.state
    networks:
      - default

  scanner_worker:
    build: .
    command: ["service", "--name", "scanner_worker"]
    depends_on:
      clickhouse:
        condition: service_healthy
      schema_migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POE_CLICKHOUSE_URL: ${POE_CLICKHOUSE_INTERNAL_URL:-http://clickhouse:8123}
    volumes:
      - ./.state:/app/.state
    networks:
      - default

  ml_trainer:
    build: .
    command: ["service", "--name", "ml_trainer"]
    depends_on:
      clickhouse:
        condition: service_healthy
      schema_migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POE_CLICKHOUSE_URL: ${POE_CLICKHOUSE_INTERNAL_URL:-http://clickhouse:8123}
      POE_ML_AUTOMATION_ENABLED: "true"
      POE_ML_AUTOMATION_LEAGUE: Mirage
      POE_ML_AUTOMATION_INTERVAL_SECONDS: "120"
      POE_ML_AUTOMATION_MAX_ITERATIONS: "20"
      POE_ML_AUTOMATION_MAX_WALL_CLOCK_SECONDS: "180"
      POE_ML_AUTOMATION_NO_IMPROVEMENT_PATIENCE: "5"
      POE_ML_AUTOMATION_MIN_MDAPE_IMPROVEMENT: "0.001"
      POE_ML_V3_TRAINER_ENABLED: ${POE_ML_V3_TRAINER_ENABLED:-0}
    volumes:
      - ./.state:/app/.state
      - ./artifacts:/app/artifacts
    networks:
      - default

  poeninja_snapshot:
    build: .
    command: ["service", "--name", "poeninja_snapshot"]
    depends_on:
      clickhouse:
        condition: service_healthy
      schema_migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POE_CLICKHOUSE_URL: ${POE_CLICKHOUSE_INTERNAL_URL:-http://clickhouse:8123}
      POE_ML_AUTOMATION_LEAGUE: ${POE_ML_AUTOMATION_LEAGUE:-Mirage}
      POE_ML_DATASET_REBUILD_INTERVAL_SECONDS: ${POE_ML_DATASET_REBUILD_INTERVAL_SECONDS:-3600}
    volumes:
      - ./.state:/app/.state
      - ./artifacts:/app/artifacts
    networks:
      - default

  api:
    build: .
    command: ["service", "--name", "api"]
    depends_on:
      clickhouse:
        condition: service_healthy
      schema_migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POE_API_BIND_HOST: "0.0.0.0"
      POE_API_BIND_PORT: "8080"
      POE_API_CORS_ORIGINS: ${POE_API_CORS_ORIGINS:-https://poe.lama-lan.ch}
      POE_API_TRUSTED_ORIGIN_BYPASS: "true"
      POE_CLICKHOUSE_URL: ${POE_CLICKHOUSE_INTERNAL_URL:-http://clickhouse:8123}
      POE_ENABLE_ACCOUNT_STASH: "true"
      POE_ACCOUNT_STASH_REALM: pc
      POE_ACCOUNT_STASH_LEAGUE: Mirage
      POE_ML_V3_SERVING_ENABLED: ${POE_ML_V3_SERVING_ENABLED:-0}
    volumes:
      - ./artifacts:/app/artifacts
    networks:
      - default
      - lama-lan_backend
    restart: unless-stopped

  ml_v3_ops:
    build: .
    profiles: ["ml-v3"]
    entrypoint: ["poe-ml"]
    command: ["v3-disk-usage", "--league", "Mirage"]
    depends_on:
      clickhouse:
        condition: service_healthy
      schema_migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POE_CLICKHOUSE_URL: ${POE_CLICKHOUSE_INTERNAL_URL:-http://clickhouse:8123}
    volumes:
      - ./artifacts:/app/artifacts
      - ./.state:/app/.state
    networks:
      - default

volumes:
  clickhouse_data:

networks:
  default:
  lama-lan_backend:
    external: true
